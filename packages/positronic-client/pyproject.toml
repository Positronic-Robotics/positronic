[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "positronic-client"
version = "0.1.0"
description = "Light client for the positronic inference wire: canonical observation keys, serialization, WebSocket client"
requires-python = ">=3.11, <3.14"
license = { text = "Apache-2.0" }
dependencies = [
    "httpx",
    "msgpack",
    # Deliberately unconstrained: this package is pure Python (no compiled numpy ABI dependency; the APIs it
    # uses are stable across 1.19-2.x), and its whole point is installing into foreign venvs whose ML stacks
    # already pin their own numpy. Any constraint here only manufactures resolver conflicts — never add one.
    "numpy",
    "pillow",
    "websockets>=15.0.1",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["positronic_client*"]
