name: Run unit tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  core:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ['3.11', '3.12', '3.13']
        include:
          - {os: macos-latest, python: '3.13'}
    steps:
      - uses: actions/checkout@v4
      - name: Enable caching
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv venv --python ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: "Run tests (coverage: term, html)"
        env:
          PYTHONPATH: ${{ env.PYTHONPATH }}:$PWD
        run: >-
          uv run pytest --cov-report=html
          --override-ini='testpaths=pimm/tests positronic/cfg/tests positronic/dataset/tests positronic/geom/tests positronic/offboard/tests positronic/policy/tests positronic/tests positronic/utils/tests'

      - name: Coverage summary (job summary)
        if: always()
        run: uv run coverage report -m >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-core-${{ matrix.python }}
          path: htmlcov

  packaging:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Install as package and verify imports
        run: |
          uv venv --python ${{ matrix.python }} /tmp/pkg-test
          uv pip install --python /tmp/pkg-test . jinja2
          /tmp/pkg-test/bin/python utilities/check_packaging.py

  lerobot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable caching
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv venv --python 3.11

      - name: Install dependencies
        run: uv sync --locked --extra dev --extra lerobot_0_3_3

      - name: Run lerobot vendor tests
        env:
          PYTHONPATH: ${{ env.PYTHONPATH }}:$PWD
        run: uv run pytest positronic/vendors/lerobot_0_3_3/tests --no-cov

  lerobot-latest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable caching
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv venv --python 3.11

      - name: Install dependencies
        run: uv sync --locked --extra dev --extra lerobot

      - name: Run lerobot vendor tests
        env:
          PYTHONPATH: ${{ env.PYTHONPATH }}:$PWD
        run: uv run pytest positronic/vendors/lerobot/tests --no-cov

  lockfile-portability:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ['3.11', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv venv --python ${{ matrix.python }}
      - name: uv sync --locked succeeds on ${{ matrix.os }} (py${{ matrix.python }})
        run: uv sync --locked --extra dev
